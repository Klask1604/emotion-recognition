apiVersion: 1

providers:
  - name: Biofizic
    orgId: 1
    folder: Biofizic
    type: file
    # false => dashboards whose JSON file is removed get pruned on restart,
    # so the provisioned folder is authoritative (no stale leftovers).
    disableDeletion: false
    updateIntervalSeconds: 60
    allowUiUpdates: false
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
