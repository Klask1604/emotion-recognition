name: biofizic

x-python-service: &python-service
  build: .
  image: biofizic/python:latest
  restart: unless-stopped
  environment:
    PYTHONPATH: /app
  # mosquitto runs natively on the host (not in Docker), so containers reach it
  # via host.docker.internal. On Linux this name is not built in — map it to the
  # host gateway. Set MQTT_BROKER=host.docker.internal in .env on such a host.
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  influxdb:
    image: influxdb:3-core
    container_name: biofizic-influxdb
    ports:
      - "8181:8181"
    command:
      - influxdb3
      - serve
      - --node-id=local
      - --object-store=file
      - --data-dir=/var/lib/influxdb3/data
      - --plugin-dir=/var/lib/influxdb3/plugins
      - --without-auth
    volumes:
      - influxdb-data:/var/lib/influxdb3
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8181/health || curl -sf http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped

  influxdb-init:
    image: curlimages/curl:8.5.0
    container_name: biofizic-influxdb-init
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      INFLUX_URL: http://influxdb:8181
      INFLUX_DATABASE: ${INFLUX_DATABASE:-biofizic}
    volumes:
      - ./docker/influxdb/init-database.sh:/init-database.sh:ro
    entrypoint: ["/bin/sh", "/init-database.sh"]
    restart: "no"

  grafana:
    image: grafana/grafana:latest
    container_name: biofizic-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # InfluxDB datasource URL: unset on the server (-> internal influxdb:8181),
      # set to the server's public URL on a laptop so local Grafana reads the
      # real data. Read by provisioning/datasources/influxdb.yml.
      INFLUX_URL: ${INFLUX_URL:-http://influxdb:8181}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  compute-engine:
    <<: *python-service
    container_name: biofizic-compute-engine
    command:
      - python
      - services/compute_engine.py
      - --broker
      - ${MQTT_BROKER:-localhost}
      - --port
      - "${MQTT_PORT:-1883}"
    volumes:
      - ./data:/data
      # Use the host-trained model live; retrain + restart, no rebuild needed.
      - ./models:/app/models

  # Cardiac comparator: rolls the production DSP over 3 watch sources
  # (PPG on-demand, PPG continuous, HR continuous) and republishes derived
  # HR/RMSSD on biofizic/test/derived/* for the Grafana comparator board.
  # Opt-in via profile: `docker compose --profile test up -d test-engine`.
  test-engine:
    <<: *python-service
    container_name: biofizic-test-engine
    profiles: ["test"]
    command:
      - python
      - services/test_engine.py
      - --broker
      - ${MQTT_BROKER:-localhost}
      - --port
      - "${MQTT_PORT:-1883}"
    volumes:
      - ./data:/data

  mqtt-logger:
    <<: *python-service
    container_name: biofizic-mqtt-logger
    command:
      - python
      - services/mqtt_logger.py
      - --broker
      - ${MQTT_BROKER:-localhost}
      - --port
      - "${MQTT_PORT:-1883}"
      - --url
      - ${INFLUX_URL:-http://influxdb:8181}
      - --database
      - ${INFLUX_DATABASE:-biofizic}
    depends_on:
      influxdb:
        condition: service_healthy
      influxdb-init:
        condition: service_completed_successfully

  # Manual state publisher for VR testing (classifier OFF). Publishes the
  # biofizic/state schema Unity reads, so you can drive transitions by HTTP.
  # Not started by default: `docker compose up -d state-api`.
  state-api:
    <<: *python-service
    container_name: biofizic-state-api
    profiles: ["test"]
    command:
      - uvicorn
      - services.state_api:app
      - --host
      - "0.0.0.0"
      - --port
      - "8200"
    environment:
      PYTHONPATH: /app
      MQTT_BROKER: ${MQTT_BROKER:-localhost}
      MQTT_PORT: "${MQTT_PORT:-1883}"
    ports:
      - "8200:8200"

volumes:
  influxdb-data:
  grafana-data:
